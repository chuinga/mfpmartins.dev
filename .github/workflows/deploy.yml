name: Deploy Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  AWS_REGION: eu-west-1
  NODE_VERSION: '22'
  TERRAFORM_VERSION: '1.7'

jobs:
  # Step 1: Lint, type-check, and build
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Build static export
        run: npm run build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: out/

  # Step 2: Security scanning
  preflight-sast:
    name: Preflight SAST
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      - name: Check for hardcoded secrets
        run: |
          ! grep -rn "AKIA[0-9A-Z]\{16\}" --include="*.ts" --include="*.tsx" --include="*.js" src/ || echo "No hardcoded AWS keys found"

  # Step 3: Terraform plan
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [validate, preflight-sast]
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/tfplan

  # Step 4: Terraform deploy
  terraform-deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: terraform-plan
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infra

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # Step 5: Deploy to S3 + invalidate CloudFront
  deploy-site:
    name: Deploy to S3
    runs-on: ubuntu-latest
    needs: [terraform-deploy]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: static-site
          path: out

      - name: Sync to S3
        run: aws s3 sync out/ s3://mfpmartins-dev-website --delete

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Origins.Items[?DomainName=='mfpmartins-dev-website.s3.eu-west-1.amazonaws.com']].Id" --output text)
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
          fi
